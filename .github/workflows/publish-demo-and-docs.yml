name: publish-demo-and-docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.1'
          cache: true

      - name: Copy wasm_exec.js
        run: cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" ./app/wwwroot/

      - name: Build AOT compiler
        run: go build -o ./nojsc ./compiler/cmd/nojsc

      - name: Compile demo templates
        run: ./nojsc -in=./app/internal/app/components

      - name: Build demo WASM
        run: GOOS=js GOARCH=wasm go build -o ./app/wwwroot/main.wasm ./app/internal/app

      - name: Upload demo artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo
          path: app/wwwroot

  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: site

  publish:
    runs-on: ubuntu-latest
    needs: [build-demo, build-docs]
    if: always() && (needs.build-demo.result == 'success' || needs.build-docs.result == 'success')
    steps:
      - name: Download demo artifact
        if: needs.build-demo.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: demo
          path: publish/demo

      - name: Download docs artifact
        if: needs.build-docs.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: publish

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: publish
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
